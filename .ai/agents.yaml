# AI SDD Agent 注册与配置
# 与 knowledge/solutions、knowledge/analysis、docs/requirements/* 阶段规范对齐

agents:
  # ===== 核心协调 =====
  orchestrator:
    name: "工作流编排 Agent"
    role: "总指挥"
    description: "负责整体工作流编排、阶段流转、质量门禁和异常处理"
    capabilities:
      - workflow_orchestration
      - stage_gate_control
      - agent_coordination
      - exception_handling
      - progress_tracking

  # ===== 解决方案阶段 =====
  solution_analyst:
    name: "解决方案分析 Agent"
    role: "解决方案架构师"
    description: "从业务描述中提取结构化需求，评估影响面，识别冲突，制定解决方案"
    capabilities:
      - business_requirement_extraction
      - system_impact_assessment
      - conflict_detection
      - solution_formulation
    input_context:
      - "业务描述/需求原文"
      - "knowledge/**"
      - "specs/**"
      - "solutions/archive/**"
    output_artifacts:
      - "solutions/SOLUTION-{ID}.md"

  # ===== 需求分析阶段 =====
  requirement_analyst:
    name: "需求分析 Agent"
    role: "需求分析师"
    description: "深度研究解决方案，细化需求与建模，MVP 拆分与规划，依赖分析与风险评估"
    capabilities:
      - requirement_decomposition
      - mvp_planning
      - dependency_analysis
      - priority_assessment
      - feasibility_validation
    input_context:
      - "solutions/SOLUTION-{ID}.md"
      - "knowledge/**"
      - "specs/**"
    output_artifacts:
      - "analysis/REQUIREMENT-{ID}.md"

  # ===== 需求交付 - 产品需求 =====
  product_designer:
    name: "产品设计 Agent"
    role: "产品经理"
    description: "将需求转化为业务流程、用户故事、用例建模、功能模块与交互设计"
    capabilities:
      - business_flow_design
      - user_story_writing
      - use_case_modeling
      - interaction_design
      - business_rule_definition
      - acceptance_criteria_def
    input_context:
      - "analysis/REQUIREMENT-{ID}.md"
      - "knowledge/product/**"
    output_artifacts:
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/PRD-{ID}.md"

  # ===== 需求交付 - 方案设计 =====
  architect:
    name: "架构设计 Agent"
    role: "架构师"
    description: "系统架构、接口协议、领域模型、数据架构、发布方案设计"
    capabilities:
      - domain_driven_design
      - microservice_decomposition
      - api_design
      - data_model_design
      - integration_design
      - distributed_arch_design
    input_context:
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/PRD-{ID}.md"
      - "knowledge/technical/**"
      - "knowledge/constitution/adr/**"
      - "knowledge/business/**"
    output_artifacts:
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md（架构部分）"

  backend_architect:
    name: "详细设计 Agent"
    role: "后端/详细设计"
    description: "系统集成、接口详细设计、逻辑详细设计、数据访问、非功能性设计"
    capabilities:
      - integration_design
      - api_detailed_design
      - data_access_design
      - security_design
      - observability_design
    input_context:
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/PRD-{ID}.md"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md"
      - "knowledge/technical/**"
      - "knowledge/constitution/adr/**"
      - "specs/**"
      - "src/**"
    output_artifacts:
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md（详细设计）"

  technical_writer:
    name: "技术文档 Agent"
    role: "技术写作"
    description: "按模板输出解决方案、需求分析、产品需求、架构/测试设计等文档"
    capabilities:
      - doc_generation_from_template
      - spec_generation
    input_context:
      - "各阶段 1～4 步分析/设计结果"
      - ".ai/rules/solution/solution-template.md"
      - ".ai/rules/analysis/requirement-template.md"
      - ".ai/rules/requirement/prd-template.md"
      - ".ai/rules/requirement/add-template.md"
      - ".ai/rules/requirement/tdd-template.md"
    output_artifacts:
      - "solutions/SOLUTION-{ID}.md"
      - "analysis/REQUIREMENT-{ID}.md"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/PRD-{ID}.md"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/TDD-{ID}.md"
      - "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/**"

  doc_updater:
    name: "文档更新 Agent"
    role: "文档维护"
    description: "文档输出与评审、规约文件生成与更新、文档同步"
    capabilities:
      - doc_sync_update
      - spec_generation
      - doc_quality_audit
    input_context:
      - "各阶段产出物"
      - "knowledge/**"
      - "specs/**"
    output_artifacts:
      - "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/{service-name}/api/**"
      - "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/{service-name}/domain/**"
      - "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/{service-name}/data/**"
      - "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/{service-name}/integration/**"

  quality_guardian:
    name: "质量守护 Agent"
    role: "质量保障"
    description: "影响面评估、依赖与风险评估、测试计划制定、质量门禁检查"
    capabilities:
      - spec_compliance_check
      - cross_doc_consistency
      - quality_gate_evaluation
      - risk_assessment
    input_context:
      - "docs/**"
      - "specs/**"
      - "src/**"
    output_artifacts:
      - "质量检查报告（内联于各阶段产物）"

  quality_engineer:
    name: "质量工程 Agent"
    role: "测试策略与验证"
    description: "测试策略、测试用例设计、测试验证与覆盖率分析"
    capabilities:
      - test_strategy_design
      - test_case_generation
      - test_coverage_analysis
    input_context:
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/PRD-{ID}.md"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md"
      - "knowledge/technical/**"
      - "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/**"
      - "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/**"
    output_artifacts:
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/TDD-{ID}.md"

  # ===== 需求交付 - 需求开发 =====
  developer:
    name: "开发 Agent"
    role: "全栈开发工程师"
    description: "规约转 SDD Spec、任务拆解、编码实现、测试验证、文档更新"
    capabilities:
      - code_generation
      - unit_test_implementation
      - integration_implementation
      - deployment_scripting
    input_context:
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/TDD-{ID}.md"
      - "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/**"
      - "specs/**"
      - "src/**"
    output_artifacts:
      - "src/**"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/DEV-{ID}.md"

  database_reviewer:
    name: "数据库审查 Agent"
    role: "数据库设计/审查"
    description: "开发准备阶段规约与数据设计确认、DDL 与迁移审查"
    capabilities:
      - database_design_review
      - migration_review
    input_context:
      - "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/**"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md"
    output_artifacts:
      - "开发任务清单（与 developer 协作）"

  code_reviewer:
    name: "代码审查 Agent"
    role: "代码审查"
    description: "架构一致性、代码质量、测试质量、可维护性审查"
    capabilities:
      - code_review
      - code_quality_check
    input_context:
      - "src/**"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/TDD-{ID}.md"
    output_artifacts:
      - "审查结果（写入 DEV-{ID}.md）"

  security_reviewer:
    name: "安全审查 Agent"
    role: "安全审查"
    description: "安全漏洞、敏感数据处理、权限控制审查"
    capabilities:
      - security_audit
      - vulnerability_check
    input_context:
      - "src/**"
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md"
    output_artifacts:
      - "安全审查结果（写入 DEV-{ID}.md）"

  tdd_guide:
    name: "TDD 引导 Agent"
    role: "测试驱动开发"
    description: "按 TDD 流程引导编写测试与实现，保证覆盖率"
    capabilities:
      - test_driven_development
      - test_first_guidance
    input_context:
      - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/TDD-{ID}.md"
      - "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/**"
      - "src/**"
    output_artifacts:
      - "单元测试与实现代码"

  # ===== 需求归档阶段 =====
  documentation_curator:
    name: "文档管理 Agent"
    role: "技术文档工程师"
    description: "维护系统说明文档体系，生成变更记录，同步产品/架构/API/测试文档"
    capabilities:
      - changelog_generation
      - doc_sync_update
      - doc_consistency_check
      - doc_quality_audit
    input_context:
      - "docs/requirements/REQUIREMENT-{ID}/**"
      - "knowledge/**"
      - "docs/changelog/**"
      - "specs/**"
      - "src/**"
    output_artifacts:
      - "docs/changelog/changes/CHANGE-{ID}.md"
      - "docs/changelog/CHANGELOG.md"
      - "knowledge/**（更新）"
