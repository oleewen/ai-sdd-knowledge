# 知识库全局配置（可选）
# 用于未来工具链、CI 校验或索引生成时读取。当前为占位，可按需扩展。

version: "1.0"
name: "软件系统知识文档库"

# 视角目录（相对本 knowledge/ 目录）
views:
  constitution: "constitution"
  business: "business"
  product: "product"
  technical: "technical"
  data: "data"

# 解决方案与需求分析（与 knowledge 平级，位于仓库根）
artifacts:
  solutions: "../solutions"    # 解决方案文档 SOLUTION-{ID}.md，详见 .ai/rules/solution/solution-template.md 与 .ai/skills/sdd-solution/SKILL.md
  analysis: "../analysis"     # 需求分析文档 REQUIREMENT-{ID}.md，详见 .ai/rules/analysis/requirement-template.md 与 .ai/skills/sdd-analysis/SKILL.md

# 应用级 manifest 约定（供 CI 同步参考）
app_manifest:
  path: "/docs/manifest.yaml"
  required_fields: ["apis", "events", "schema_changes"]  # 可选，按实际规范调整

# 设计依据说明（相对仓库根目录）
design_ref: "../DESIGN.md"
index_ref: "../INDEX.md"
